# OrbitOps pipeline definition — the single source of truth for stages and gates.
# Edited via PR only (see CODEOWNERS). Validated by scripts/validate-pipeline-config.mjs.
# Stage order in this file IS the promotion order (left to right on the board).

devOrgs:
  - name: Shared dev org (also INT)
    org: INT
    authMethod: sfdx-url
pipeline:
  - branch: uat
    org: UAT
    environment: uat
    authMethod: sfdx-url
    testLevel: RunLocalTests
    gates:
      scannerMaxSeverity: 2
      minCoverage: 75
      requiredReviewers: true
  - branch: main
    org: PROD
    environment: production
    authMethod: jwt
    testLevel: RunLocalTests
    gates:
      scannerMaxSeverity: 2
      minCoverage: 80
      requiredReviewers: true
