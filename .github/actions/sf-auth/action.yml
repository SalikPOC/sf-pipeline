name: "Salesforce CLI setup + org auth"
description: >
  Installs Salesforce CLI v2 with the sfdx-git-delta and code-analyzer plugins
  (pinned versions), then authenticates to an org. Two auth methods:
  "jwt" (connected app + certificate — used for PROD) and
  "sfdx-url" (SFDX auth URL — used for scratch-org stages, whose orgs cannot
  create connected apps since Spring '26). Used by every OrbitOps workflow
  that touches an org.

inputs:
  auth-method:
    description: '"jwt", "sfdx-url", or "none" (install CLI + plugins only, no org auth)'
    required: false
    default: "jwt"
  # jwt method
  client-id:
    description: "Connected app consumer key (secret SF_CLIENT_ID)"
    required: false
  username:
    description: "Integration user username (secret SF_USERNAME)"
    required: false
  jwt-key:
    description: "Private key PEM contents (secret SF_JWT_KEY)"
    required: false
  instance-url:
    description: "Login URL: https://login.salesforce.com for prod/dev orgs, https://test.salesforce.com for sandboxes and scratch orgs (secret SF_INSTANCE_URL)"
    required: false
  # sfdx-url method
  auth-url:
    description: "SFDX auth URL, from `sf org display --verbose` (secret SF_AUTH_URL)"
    required: false
  alias:
    description: "CLI alias to assign to the authenticated org"
    required: false
    default: "target-org"
  cli-version:
    description: "Pinned @salesforce/cli version"
    required: false
    default: "2.142.7"
  sgd-version:
    description: "Pinned sfdx-git-delta plugin version"
    required: false
    default: "6.45.1"
  code-analyzer-version:
    description: "Pinned @salesforce/plugin-code-analyzer version"
    required: false
    default: "5.14.0"

runs:
  using: "composite"
  steps:
    - name: Install Salesforce CLI and plugins (cached)
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v sf >/dev/null || [ "$(sf version --json | node -pe 'JSON.parse(require("fs").readFileSync(0,"utf8")).cliVersion' 2>/dev/null)" != "@salesforce/cli/${{ inputs.cli-version }}" ]; then
          npm install --global "@salesforce/cli@${{ inputs.cli-version }}"
        fi
        echo y | sf plugins install "sfdx-git-delta@${{ inputs.sgd-version }}"
        echo y | sf plugins install "@salesforce/plugin-code-analyzer@${{ inputs.code-analyzer-version }}"
        sf version --verbose

    - name: Authenticate
      shell: bash
      env:
        SF_AUTH_METHOD: ${{ inputs.auth-method }}
        SF_AUTH_CLIENT_ID: ${{ inputs.client-id }}
        SF_AUTH_USERNAME: ${{ inputs.username }}
        SF_AUTH_JWT_KEY: ${{ inputs.jwt-key }}
        SF_AUTH_INSTANCE_URL: ${{ inputs.instance-url }}
        SF_AUTH_URL_VALUE: ${{ inputs.auth-url }}
      run: |
        set -euo pipefail
        TMPFILE="$(mktemp)"
        trap 'rm -f "$TMPFILE"' EXIT
        case "$SF_AUTH_METHOD" in
          jwt)
            : "${SF_AUTH_CLIENT_ID:?client-id required for jwt}" \
              "${SF_AUTH_USERNAME:?username required for jwt}" \
              "${SF_AUTH_JWT_KEY:?jwt-key required for jwt}" \
              "${SF_AUTH_INSTANCE_URL:?instance-url required for jwt}"
            printf '%s' "$SF_AUTH_JWT_KEY" > "$TMPFILE"
            sf org login jwt \
              --client-id "$SF_AUTH_CLIENT_ID" \
              --username "$SF_AUTH_USERNAME" \
              --jwt-key-file "$TMPFILE" \
              --instance-url "$SF_AUTH_INSTANCE_URL" \
              --alias "${{ inputs.alias }}" \
              --set-default
            ;;
          sfdx-url)
            : "${SF_AUTH_URL_VALUE:?auth-url required for sfdx-url}"
            printf '%s' "$SF_AUTH_URL_VALUE" > "$TMPFILE"
            sf org login sfdx-url \
              --sfdx-url-file "$TMPFILE" \
              --alias "${{ inputs.alias }}" \
              --set-default
            ;;
          none)
            echo "CLI + plugins installed; skipping org auth (auth-method: none)"
            ;;
          *)
            echo "Unknown auth-method: $SF_AUTH_METHOD" >&2; exit 1
            ;;
        esac
