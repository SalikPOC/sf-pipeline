# Weekly full-repo static analysis (REQUIREMENTS.md E7.4) — refreshes code
# scanning results and the "Scanner burn-down" tracking issue.
name: OrbitOps Full Scan

on:
  schedule:
    - cron: "0 3 * * 1" # Mondays 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write
  issues: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  full-scan:
    name: Full scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - uses: ./.github/actions/sf-auth
        with: { auth-method: none }
      - name: Scan full workspace
        id: scan
        run: |
          sf code-analyzer run --workspace force-app --config-file code-analyzer.yml --output-file results.sarif
          HAS_RUNS=$(node -pe 'JSON.parse(require("fs").readFileSync("results.sarif","utf8")).runs?.length > 0' 2>/dev/null || echo false)
          echo "has_runs=$HAS_RUNS" >> "$GITHUB_OUTPUT"
      - name: Upload SARIF to code scanning
        if: steps.scan.outputs.has_runs == 'true'
        uses: github/codeql-action/upload-sarif@df409f7d9260372bd5f19e5b04e83cb3c43714ae # v3.27.9
        with:
          sarif_file: results.sarif
          category: orbitops-full
      - name: Update burn-down issue
        run: node scripts/scanner/burndown.mjs results.sarif --issue
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: full-scan-sarif
          path: results.sarif
