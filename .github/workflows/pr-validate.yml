# OrbitOps PR validation — THIN CALLER. Do not add logic here.
#
# All validation logic lives in _pr-validate.yml on MAIN (referenced with
# @main below, deliberately a moving ref — that's the point): fixes merged to
# main apply to every stage branch immediately. This stub is installed once on
# each stage branch and never needs to change again.
name: OrbitOps

on:
  pull_request:
    # Stage topology lives ONLY in .orbitops/pipeline.yml — the reusable
    # workflow skips PRs whose base isn't a pipeline stage.
    branches-ignore: ["feature/**"]

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    uses: SalikPOC/sf-pipeline/.github/workflows/_pr-validate.yml@main
    secrets: inherit
