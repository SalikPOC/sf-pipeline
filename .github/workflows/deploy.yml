# OrbitOps deploy — THIN CALLER. Do not add logic here.
#
# All deploy logic lives in _deploy.yml on MAIN (referenced with @main below,
# deliberately a moving ref — that's the point): fixes merged to main apply to
# every stage branch immediately. This stub is installed once on each stage
# branch and never needs to change again.
name: OrbitOps Deploy

on:
  push:
    # Stage topology lives ONLY in .orbitops/pipeline.yml — the reusable
    # workflow skips pushes to branches that aren't pipeline stages.
    branches-ignore: ["feature/**", "orbitops-meta", "orbitops/**"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this manual deploy is needed (audit log)"
        required: true

permissions:
  contents: write # deploy tags + orbitops-meta branch
  deployments: write
  pull-requests: write # back-promotion PRs

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false # queue, never cancel a deploy

jobs:
  pipeline:
    uses: SalikPOC/sf-pipeline/.github/workflows/_deploy.yml@main
    with:
      reason: ${{ inputs.reason || '' }}
    secrets: inherit
